<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOLO VACACIONES - SISTEMA DE SEGURIDAD</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --dark-bg: #0a0a0a;
            --grid-size: 8; /* Tablero 8x8 */
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: uppercase;
        }

        /* Efecto scanlines CRT */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        #intro, #game, #final {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 900px;
        }

        #introText {
            font-size: 1.2rem;
            line-height: 1.5;
            min-height: 250px;
            text-shadow: 0 0 5px var(--neon-green);
        }

        .btn {
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 15px 30px;
            font-family: inherit;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            display: none;
            z-index: 20;
        }

        .btn:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }

        /* Grid de Juego 8x8 */
        #grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), 1fr);
            gap: 8px;
            width: 100%;
            max-width: 750px; /* Más ancho para cartas más grandes */
        }

        .card {
            aspect-ratio: 1 / 1;
            border: 2px solid var(--neon-green);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background: #111;
            font-size: 2.5rem; /* Tamaño de los símbolos */
            user-select: none;
            transition: transform 0.2s, background 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #1a1a1a;
        }

        .card .content {
            display: none;
        }

        .card.flipped {
            background: #222;
            transform: rotateY(180deg);
        }

        .card.flipped .content {
            display: block;
            transform: rotateY(180deg);
        }

        .card.matched {
            border-color: transparent;
            background: transparent;
            cursor: default;
        }
        
        .card.matched .content {
            opacity: 0.3;
        }

        #gameHeader {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--neon-green);
        }

        #countdown { font-size: 3rem; text-align: center; }
    </style>
</head>
<body>

    <div id="intro">
        <div id="introText"></div>
        <button id="startBtn" class="btn" onclick="startGame()">INICIAR PROTOCOLO CARIBE</button>
    </div>

    <div id="game" style="display: none;">
        <div id="gameHeader">
            <span>PAREJAS: <span id="matches">0</span>/32</span>
            <span id="timer">06:00</span>
        </div>
        <div id="grid"></div>
    </div>

    <div id="final" style="display: none;">
        <h2>ACCESO TOTAL CONCEDIDO</h2>
        <p>REINICIO DE SISTEMA EN:</p>
        <div id="countdown"></div>
    </div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, duration, vol) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playFaxSound() {
    for(let i=0; i<20; i++) {
        setTimeout(() => {
            playSound(800 + Math.random() * 1200, 'sawtooth', 0.1, 0.01);
            playSound(400 + Math.random() * 400, 'sine', 0.1, 0.01);
        }, i * 100);
    }
}

/* 🌴 SÍMBOLOS TEMÁTICOS */
const symbols = [
    "🏝️", "🏖️", "🥥", "🍹", "🍍", "🌊", "☀️", "🚢", // Caribe/Playa
    "🎄", "🎅", "🎁", "❄️", "🌟", "🔔", "🍪", "🕯️", // Navidad
    "🎆", "🍾", "🥂", "🎉", "🎈", "🕛", "🍇", "💃", // Nochevieja
    "🎷", "🎸", "🎵", "🌅", "🦜", "🐚", "🦀", "🐠"  // Extra Caribe
];

const lines = [
    "CONECTANDO CON SATÉLITE REGIONAL... [CARIBE_NET]",
    "CARGANDO PROTOCOLO DE CELEBRACIÓN...",
    "ESTABLECIENDO CONEXIÓN SEGURA...",
    "",
    "USUARIOS DETECTADOS:",
    "> YAIZA (MODO VACACIONES: ACTIVADO)",
    "> YAEL (MODO VACACIONES: ACTIVADO)",
    "> JOEL (MODO VACACIONES: ACTIVADO)",
    "",
    "SOLICITUD DE DESCONEXIÓN: APROBADA",
    "",
    "OBJETIVO: RESOLVER EL TABLERO 8x8 EN 6 MINUTOS.",
    "ERROR: EL SISTEMA SE AUTODESTRUIRÁ SI NO COMPLETÁIS LA FASE."
];

let lineIdx = 0, charIdx = 0;
const introDiv = document.getElementById("introText");

function type() {
    if (lineIdx < lines.length) {
        let currentLine = lines[lineIdx];
        if (charIdx < currentLine.length) {
            introDiv.innerHTML += currentLine[charIdx];
            playSound(300 + Math.random() * 100, 'square', 0.05, 0.01);
            charIdx++;
            setTimeout(type, 40);
        } else {
            introDiv.innerHTML += "<br>";
            lineIdx++;
            charIdx = 0;
            setTimeout(type, currentLine.includes(">") ? 800 : 400);
        }
    } else {
        document.getElementById("startBtn").style.display = "block";
    }
}

window.onload = () => {
    playFaxSound();
    setTimeout(type, 1000);
};

/* 🎮 LÓGICA DEL JUEGO */
let cards = [], selected = [], matchedCount = 0, timeLeft = 360;
let lockBoard = false, timerInterval;

function startGame() {
    audioCtx.resume();
    document.getElementById("intro").style.display = "none";
    document.getElementById("game").style.display = "flex";
    setupBoard();
    timerInterval = setInterval(updateTimer, 1000);
}

function setupBoard() {
    // 32 parejas para llenar el tablero de 64 (8x8)
    let deck = [];
    for(let i=0; i<32; i++) {
        deck.push({ id: i, sym: symbols[i] });
        deck.push({ id: i, sym: symbols[i] });
    }
    cards = deck.sort(() => Math.random() - 0.5);

    const grid = document.getElementById("grid");
    cards.forEach((card) => {
        const div = document.createElement("div");
        div.className = "card";
        div.dataset.id = card.id;
        div.innerHTML = `<div class="content">${card.sym}</div>`;
        div.onclick = () => flipCard(div);
        grid.appendChild(div);
    });
}

function flipCard(el) {
    if (lockBoard || el.classList.contains('flipped') || el.classList.contains('matched')) return;

    playSound(500, 'sine', 0.1, 0.02);
    el.classList.add('flipped');
    selected.push(el);

    if (selected.length === 2) {
        lockBoard = true;
        setTimeout(checkMatch, 600);
    }
}

function checkMatch() {
    const [c1, c2] = selected;
    if (c1.dataset.id === c2.dataset.id) {
        playSound(900, 'sine', 0.2, 0.03);
        c1.classList.add('matched');
        c2.classList.add('matched');
        matchedCount++;
        document.getElementById("matches").innerText = matchedCount;
        selected = [];
        lockBoard = false;
        if (matchedCount === 32) win();
    } else {
        playSound(100, 'sawtooth', 0.2, 0.02);
        setTimeout(() => {
            c1.classList.remove('flipped');
            c2.classList.remove('flipped');
            selected = [];
            lockBoard = false;
        }, 500);
    }
}

function updateTimer() {
    timeLeft--;
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    document.getElementById("timer").innerText = `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
    if (timeLeft <= 0) {
        clearInterval(timerInterval);
        alert("SISTEMA BLOQUEADO. REINICIANDO PROTOCOLO...");
        location.reload();
    }
}

function win() {
    clearInterval(timerInterval);
    document.getElementById("game").style.display = "none";
    document.getElementById("final").style.display = "flex";
    playFaxSound();
    
    const target = new Date("2026-12-26T00:00:00").getTime();
    setInterval(() => {
        const diff = target - Date.now();
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById("countdown").innerText = `${d}d ${h}h ${m}m ${s}s`;
    }, 1000);
}
</script>
</body>
</html>
