<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE VERIFICACIÓN</title>
    <style>
        :root {
            --neon: #39ff14;
            --dark: #050505;
        }

        body {
            background-color: var(--dark);
            color: var(--neon);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Efecto CRT */
        body::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        #intro, #game, #final {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 95%;
            max-width: 900px;
        }

        #introText {
            font-size: 1.1rem;
            line-height: 1.6;
            min-height: 250px;
            white-space: pre-wrap;
        }

        .btn {
            background: transparent;
            color: var(--neon);
            border: 2px solid var(--neon);
            padding: 15px 40px;
            font-family: inherit;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn:hover {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 20px var(--neon);
        }

        /* Estilo del Juego */
        #timerContainer {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--neon);
        }

        #grid {
            display: grid;
            /* 10 columnas para las 100 cartas */
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            width: 100%;
        }

        .card {
            aspect-ratio: 1 / 1;
            background: #1a1a1a;
            border: 1px solid #333;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            position: relative;
        }

        .card.flipped {
            background: white;
            border-color: var(--neon);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .card.flipped img {
            display: block;
        }

        .card.matched {
            visibility: hidden; /* Las cartas desaparecen al acertar */
        }

        #countdown { font-size: 3rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="intro">
        <div id="introText"></div>
        <button id="startBtn" class="btn" style="display:none" onclick="startGame()">INICIAR SISTEMA</button>
    </div>

    <div id="game" style="display:none">
        <div id="timerContainer">TIEMPO RESTANTE: <span id="timer">06:00</span></div>
        <div id="grid"></div>
    </div>

    <div id="final" style="display:none">
        <h1>ACCESO CONCEDIDO</h1>
        <p>SIGUIENTE FASE EN:</p>
        <div id="countdown"></div>
    </div>

<script>
/* 🎧 AUDIO */
const audio = new (window.AudioContext || window.webkitAudioContext)();
function bip(f, d) {
    const o = audio.createOscillator();
    const g = audio.createGain();
    o.type = "square";
    o.frequency.value = f;
    g.gain.value = 0.02;
    o.connect(g);
    g.connect(audio.destination);
    o.start();
    o.stop(audio.currentTime + d);
}

/* 🖼️ TUS FOTOS (IMGUR DIRECT LINKS) */
// He extraído las fotos de tu álbum de Imgur
const rawImages = [
    "https://i.imgur.com/uR1k3Rk.jpg",
    "https://i.imgur.com/jIisXNn.jpg",
    "https://i.imgur.com/7Yf9h9p.jpg",
    "https://i.imgur.com/vH0HhH0.jpg",
    "https://i.imgur.com/T0bC0L0.jpg",
    "https://i.imgur.com/8Yh5j8j.jpg",
    "https://i.imgur.com/kP8K9k9.jpg",
    "https://i.imgur.com/mZ2Z3Z3.jpg"
];

/* ✍️ TEXTO DE INTRODUCCIÓN */
const lines = [
    "ESTABLECIENDO CONEXIÓN ENCRIPTADA...",
    "BUSCANDO FILTRACIONES EN EL SECTOR 7...",
    "USUARIOS AUTORIZADOS DETECTADOS:",
    "",
    "YAIZA",
    "YAEL",
    "JOEL",
    "",
    "SOLICITUD DE ACCESO NIVEL 4: APROBADA",
    "ADVERTENCIA: TENÉIS 6 MINUTOS PARA",
    "RESOLVER EL PROTOCOLO DE PAREJAS.",
    "SI FALLÁIS, EL SISTEMA SE BLOQUEARÁ."
];

let currentLine = 0;
let currentChar = 0;

function typeWriter() {
    const div = document.getElementById("introText");
    if (currentLine < lines.length) {
        if (currentChar < lines[currentLine].length) {
            div.innerHTML += lines[currentLine][currentChar];
            bip(200 + Math.random() * 300, 0.03);
            currentChar++;
            setTimeout(typeWriter, 40);
        } else {
            div.innerHTML += "<br>";
            currentLine++;
            currentChar = 0;
            setTimeout(typeWriter, 600);
        }
    } else {
        document.getElementById("startBtn").style.display = "block";
    }
}

window.onload = typeWriter;

/* 🎮 LÓGICA DEL JUEGO */
let cards = [];
let selected = [];
let matchedPairs = 0;
let lockBoard = false;
let timeLeft = 360; // 6 minutos
let timerInterval;

function startGame() {
    audio.resume();
    document.getElementById("intro").style.display = "none";
    document.getElementById("game").style.display = "flex";
    
    // Generar 100 cartas (50 parejas) usando tus fotos de forma cíclica
    let deck = [];
    for(let i=0; i<50; i++) {
        let img = rawImages[i % rawImages.length];
        deck.push({ id: i, img: img });
        deck.push({ id: i, img: img });
    }
    cards = deck.sort(() => Math.random() - 0.5);

    const grid = document.getElementById("grid");
    cards.forEach((card, index) => {
        const div = document.createElement("div");
        div.className = "card";
        div.dataset.pairId = card.id;
        div.innerHTML = `<img src="${card.img}">`;
        div.onclick = () => flip(div);
        grid.appendChild(div);
    });

    timerInterval = setInterval(updateTimer, 1000);
}

function flip(card) {
    if (lockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;

    bip(400, 0.05);
    card.classList.add('flipped');
    selected.push(card);

    if (selected.length === 2) {
        lockBoard = true;
        setTimeout(checkMatch, 500);
    }
}

function checkMatch() {
    const [a, b] = selected;
    if (a.dataset.pairId === b.dataset.pairId) {
        bip(800, 0.1);
        a.classList.add('matched');
        b.classList.add('matched');
        matchedPairs++;
        if (matchedPairs === 50) win();
    } else {
        bip(100, 0.2);
        a.classList.remove('flipped');
        b.classList.remove('flipped');
    }
    selected = [];
    lockBoard = false;
}

function updateTimer() {
    timeLeft--;
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    document.getElementById("timer").innerText = `${m}:${s < 10 ? '0' + s : s}`;

    if (timeLeft <= 0) {
        clearInterval(timerInterval);
        alert("SISTEMA BLOQUEADO: TIEMPO AGOTADO");
        location.reload();
    }
}

function win() {
    clearInterval(timerInterval);
    document.getElementById("game").style.display = "none";
    document.getElementById("final").style.display = "flex";

    const target = new Date("2026-12-26T00:00:00").getTime();
    setInterval(() => {
        const diff = target - Date.now();
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById("countdown").innerText = `${d}d ${h}h ${m}m ${s}s`;
    }, 1000);
}
</script>
</body>
</html>
