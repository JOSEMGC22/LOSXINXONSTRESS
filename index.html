<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE VERIFICACIÓN DE IDENTIDAD</title>
    <style>
        :root {
            --neon: #39ff14;
            --dark: #0a0a0a;
        }

        body {
            background-color: var(--dark);
            color: var(--neon);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: uppercase;
        }

        /* Capa de efecto monitor antiguo */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        #intro, #game, #final {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 850px;
        }

        #introText {
            font-size: 1.2rem;
            line-height: 1.6;
            min-height: 300px;
            text-shadow: 0 0 5px var(--neon);
            white-space: pre-wrap;
        }

        .btn {
            background: transparent;
            color: var(--neon);
            border: 2px solid var(--neon);
            padding: 15px 35px;
            font-family: inherit;
            cursor: pointer;
            margin-top: 20px;
            font-size: 1.1rem;
            display: none;
            z-index: 20;
        }

        .btn:hover {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 20px var(--neon);
        }

        /* Grid 8x8 */
        #grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 700px;
        }

        .card {
            aspect-ratio: 1 / 1;
            border: 2px solid var(--neon);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background: #111;
            font-size: 2.2rem;
            transition: transform 0.2s;
        }

        .card .inner { display: none; }
        .card.flipped .inner { display: block; }

        .card.matched {
            border-color: transparent;
            background: transparent;
            cursor: default;
        }
        .card.matched .inner { opacity: 0.2; }

        #timer {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--neon);
        }

        #countdown { font-size: 3rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="intro">
        <div id="introText"></div>
        <button id="startBtn" class="btn" onclick="startGame()">ACCEDER AL SISTEMA</button>
    </div>

    <div id="game" style="display: none;">
        <div id="timer">TIEMPO RESTANTE: 06:00</div>
        <div id="grid"></div>
    </div>

    <div id="final" style="display: none;">
        <h2>SOLICITUD AUTORIZADA</h2>
        <p>PRÓXIMA FASE EN:</p>
        <div id="countdown"></div>
    </div>

<script>
/* 🔊 MOTOR DE AUDIO (ROUTER + EFECTOS) */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, duration, vol) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

// Sonido de Router/Fax antiguo (ruidoso y digital)
function playRouterSound() {
    let now = audioCtx.currentTime;
    for(let i=0; i<30; i++) {
        let time = now + (i * 0.1);
        let f = 600 + Math.random() * 1400;
        let type = i % 2 === 0 ? 'sawtooth' : 'square';
        
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(f, time);
        g.gain.setValueAtTime(0.015, time);
        g.gain.linearRampToValueAtTime(0, time + 0.08);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 0.08);
    }
}

/* ✍️ TEXTO ORIGINAL */
const lines = [
    "DETECTANDO USUARIOS CONECTADOS",
    "PARA VERIFICAR AUTORIZACION",
    "",
    "YAIZA",
    "YAEL",
    "JOEL",
    "",
    "SOLICITUD AUTORIZADA",
    "",
    "TENEIS 6 MINUTOS PARA COMPLETAR",
    "EL JUEGO DE LAS PAREJAS SIGUIENTES",
    "PARA PASAR A LA SIGUIENTE FASE"
];

let currentLine = 0, currentChar = 0;
const introDiv = document.getElementById("introText");

function typeLine() {
    if (currentLine < lines.length) {
        let line = lines[currentLine];
        if (currentChar < line.length) {
            introDiv.innerHTML += line[currentChar];
            playSound(180 + Math.random() * 120, 'square', 0.05, 0.02);
            currentChar++;
            setTimeout(typeLine, 55);
        } else {
            introDiv.innerHTML += "<br>";
            currentLine++;
            currentChar = 0;
            let pause = 400;
            if(["YAIZA", "YAEL", "JOEL"].includes(line)) pause = 1200;
            if(line === "SOLICITUD AUTORIZADA") pause = 1500;
            setTimeout(typeLine, pause);
        }
    } else {
        document.getElementById("startBtn").style.display = "block";
    }
}

// Iniciar al cargar (requiere primer clic del usuario para audio en algunos navegadores)
window.onclick = () => {
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
        playRouterSound();
        typeLine();
        window.onclick = null; // Desactivar este evento
    }
};

// Si el navegador permite autoplay:
window.onload = () => {
    introDiv.innerHTML = "HAGA CLIC EN CUALQUIER LUGAR PARA CONECTAR...";
};

/* 🎮 JUEGO 8x8 TEMÁTICO */
const icons = [
    "🏝️","🏖️","🥥","🍹","🍍","🌊","☀️","🚢",
    "🎄","🎅","🎁","❄️","🌟","🔔","🍪","🕯️",
    "🎆","🍾","🥂","🎉","🎈","🕛","🍇","💃",
    "🎷","🎸","🎵","🌅","🦜","🐚","🦀","🐠"
];

let selected = [], matchedCount = 0, timeLeft = 360, timerInterval;

function startGame() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("game").style.display = "flex";
    
    let deck = [];
    for(let i=0; i<32; i++) {
        deck.push({ id: i, icon: icons[i] });
        deck.push({ id: i, icon: icons[i] });
    }
    deck.sort(() => Math.random() - 0.5);

    const grid = document.getElementById("grid");
    deck.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.id = item.id;
        card.innerHTML = `<span class="inner">${item.icon}</span>`;
        card.onclick = () => {
            if(selected.length < 2 && !card.classList.contains('flipped')) {
                playSound(400, 'sine', 0.1, 0.03);
                card.classList.add('flipped');
                selected.push(card);
                if(selected.length === 2) setTimeout(checkMatch, 600);
            }
        };
        grid.appendChild(card);
    });

    timerInterval = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        document.getElementById("timer").innerText = `TIEMPO RESTANTE: ${m}:${s < 10 ? '0'+s : s}`;
        if(timeLeft <= 0) location.reload();
    }, 1000);
}

function checkMatch() {
    const [a, b] = selected;
    if (a.dataset.id === b.dataset.id) {
        playSound(800, 'sine', 0.2, 0.04);
        a.classList.add('matched'); b.classList.add('matched');
        matchedCount++;
        if(matchedCount === 32) win();
    } else {
        playSound(150, 'sawtooth', 0.2, 0.03);
        a.classList.remove('flipped'); b.classList.remove('flipped');
    }
    selected = [];
}

function win() {
    clearInterval(timerInterval);
    document.getElementById("game").style.display = "none";
    document.getElementById("final").style.display = "flex";
    playRouterSound();
    
    const target = new Date("2026-12-26T00:00:00").getTime();
    setInterval(() => {
        const diff = target - Date.now();
        const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
        document.getElementById("countdown").innerText = `${d}d ${h}h ${m}m ${s}s`;
    }, 1000);
}
</script>
</body>
</html>
