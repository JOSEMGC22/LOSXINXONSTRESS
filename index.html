<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SYSTEM ACCESS</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: black;
  color: white;
  overflow: hidden;
}

/* 🎬 TRAILER */
#intro {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: radial-gradient(circle, #000, #050510);
}

#trailerText {
  white-space: pre-line;
  font-size: 16px;
  max-width: 80%;
  text-shadow: 0 0 10px black;
}

/* 🎮 GAME PANEL (RECTANGULAR CENTRADO) */
#game {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #00c9ff);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* PANEL RECTANGULAR */
#panel {
  width: min(700px, 95vw);
  aspect-ratio: 1 / 0.85;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* TIMER */
#timerTop {
  text-align: center;
  font-size: 18px;
  margin-bottom: 10px;
  color: #00ffcc;
}

/* GRID MÁS COMPACTO */
#grid {
  display: grid;
  grid-template-columns: repeat(12, 44px);
  gap: 4px;
  justify-content: center;
}

/* CARTAS */
.card {
  width: 44px;
  height: 44px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  border-radius: 10px;
  cursor: pointer;
  user-select: none;
}

/* 🔓 FINAL */
#secret {
  display: none;
  text-align: center;
  padding: 40px;
}

#bigTimer {
  font-size: 30px;
  margin: 20px;
}

a {
  color: #00ffcc;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- 🎬 TRAILER -->
<div id="intro">
  <div id="trailerText"></div>
</div>

<!-- 🎮 GAME -->
<div id="game">
  <div id="panel">
    <div id="timerTop"></div>
    <div id="grid"></div>
  </div>
</div>

<!-- 🔓 FINAL -->
<div id="secret">
  <h2>🔓 ACCESS GRANTED</h2>
  <p>CUANDO CALCULEIS CUANDO ACABA LA CUENTA ATRAS, DARLE AL LINK DE ABAJO</p>
  <div id="bigTimer"></div>
  <a href="https://TU-LINK-AQUI.COM">IR AL VIDEO</a>
</div>

<script>

/* 🔊 BIP SYSTEM */
const audio = new (window.AudioContext || window.webkitAudioContext)();

function bip(f,t){
  let o = audio.createOscillator();
  let g = audio.createGain();

  o.frequency.value = f;
  o.type = "square";

  g.gain.value = 0.05;

  o.connect(g);
  g.connect(audio.destination);

  o.start();
  o.stop(audio.currentTime + t);
}

/* 🎬 TRAILER */
const trailer = document.getElementById("trailerText");

const story =
`EN UN SISTEMA CERRADO...

TRES USUARIOS HAN SIDO DETECTADOS:
YAIZA
YAEL
JOEL

EL ACCESO HA SIDO BLOQUEADO...

SOLO UNA PRUEBA DECIDIRÁ EL RESULTADO`;

let i = 0;

function typeTrailer(){
  if(i < story.length){
    trailer.innerHTML += story[i];
    if(i % 3 === 0) bip(150 + Math.random()*300, 0.03);
    i++;
    setTimeout(typeTrailer, 35);
  } else {
    setTimeout(startGame, 1500);
  }
}

typeTrailer();

/* 🎮 GAME DATA */
const emojis = [
"🏖️","🌴","☀️","🌊","🍹","🕶️",
"⛱️","🏊","🎆","🍇","🥂","🎉"
];

let cards = [];
let selected = [];
let matched = 0;

let time = 360;
let interval;
let active = false;

/* START */
function startGame(){
  document.getElementById("intro").style.display = "none";
  document.getElementById("game").style.display = "flex";

  generate();
  render();

  interval = setInterval(timer,1000);
  active = true;
}

/* GENERATE 12x12 */
function generate(){
  cards = [];
  for(let i=0;i<72;i++){
    let e = emojis[Math.floor(Math.random()*emojis.length)];
    cards.push({id:i*2,e});
    cards.push({id:i*2+1,e});
  }
  cards.sort(()=>Math.random()-0.5);
}

/* RENDER */
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cards.forEach(c=>{
    let d = document.createElement("div");
    d.className = "card";
    d.dataset.e = c.e;
    d.dataset.id = c.id;
    d.innerText = "";
    d.onclick = ()=>flip(d);
    grid.appendChild(d);
  });
}

/* FLIP + BIP */
function flip(card){
  if(!active || card.innerText || selected.length===2) return;

  card.innerText = card.dataset.e;
  bip(400,0.04); // 🔊 BIP AL TOCAR
  selected.push(card);

  if(selected.length===2){
    setTimeout(check,300);
  }
}

/* CHECK */
function check(){
  if(selected[0].dataset.e === selected[1].dataset.e &&
     selected[0].dataset.id !== selected[1].dataset.id){
    matched += 2;
    bip(800,0.1);
  } else {
    selected.forEach(c=>c.innerText="");
    bip(120,0.1);
  }

  selected = [];

  if(matched === 144){
    win();
  }
}

/* ⏳ TIMER */
function timer(){
  time--;

  let m = Math.floor(time/60);
  let s = time%60;

  document.getElementById("timerTop").innerText =
    `TIEMPO RESTANTE: ${m}:${s<10?"0"+s:s}`;

  if(time<=0){
    location.reload();
  }
}

/* 🔓 WIN */
function win(){
  active = false;
  clearInterval(interval);

  document.getElementById("game").style.display = "none";
  document.getElementById("secret").style.display = "block";

  const target = new Date("2026-12-26T00:00:00").getTime();

  setInterval(()=>{
    let now = Date.now();
    let d = target - now;

    let days = Math.floor(d/86400000);
    let hours = Math.floor((d%86400000)/3600000);
    let mins = Math.floor((d%3600000)/60000);
    let secs = Math.floor((d%60000)/1000);

    document.getElementById("bigTimer").innerText =
      `${days}d ${hours}h ${mins}m ${secs}s`;
  },1000);
}

</script>

</body>
</html>
