<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE VERIFICACIÓN FINAL</title>
    <style>
        :root {
            --neon: #39ff14;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--dark);
            color: var(--neon);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Todo hacia arriba */
            height: 100vh;
            text-transform: uppercase;
        }

        /* Efecto CRT suave */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

        #intro, #game, #final {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 95%;
            padding-top: 10px; /* Espacio mínimo arriba */
        }

        #introText {
            margin-top: 5vh;
            font-size: 1.1rem;
            text-align: center;
            max-width: 700px;
            text-shadow: 0 0 8px var(--neon);
        }

        .btn {
            background: var(--neon);
            color: black;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 20px;
            display: none;
            z-index: 110;
        }

        /* Grid 6x6 optimizado para altura baja */
        #grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 600px; /* Más estrecho para asegurar altura */
            max-height: 70vh;
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(57, 255, 20, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.8rem;
            aspect-ratio: 1.4 / 1; /* Muy rectangular para pantallas de portátil */
        }

        .card .inner { display: none; }
        .card.flipped .inner { display: block; }
        .card.matched { opacity: 0; pointer-events: none; }

        #timer {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
            border-bottom: 2px solid var(--neon);
        }

        #final h1 { font-size: 1.8rem; margin: 10px 0; color: #fff; }
        #final p { font-size: 0.9rem; text-align: center; }
        #countdown { font-size: 3rem; margin: 10px 0; font-weight: bold; }
        
        .url-box {
            margin-top: 15px;
            padding: 10px;
            border: 1px dashed var(--neon);
            color: yellow;
            text-decoration: none;
            font-size: 0.8rem;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div id="intro">
        <div id="introText">HAGA CLIC PARA INICIAR CONEXIÓN...</div>
        <button id="startBtn" class="btn" onclick="startGame()">ACCEDER</button>
    </div>

    <div id="game" style="display: none;">
        <div id="timer">03:00</div>
        <div id="grid"></div>
    </div>

    <div id="final" style="display: none;">
        <h1>LA CUENTA ATRAS HA COMENZADO</h1>
        <div id="countdown"></div>
        <p>CUANDO ADIVINEIS CUANDO CUMPLE EL TEMPORIZADOR DARLE AL SIGUIENTE LINK:</p>
        <a href="https://TU-LINK-AQUÍ.com" class="url-box" target="_blank">https://TU-LINK-AQUÍ.com</a>
    </div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let tensionInterval;

function playBip(freq, duration, volume) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function startTensionBips() {
    tensionInterval = setInterval(() => {
        playBip(200, 0.1, 0.05); // Bip rítmico de fondo
    }, 1000);
}

const lines = [
    "DETECTANDO USUARIOS CONECTADOS",
    "PARA VERIFICAR AUTORIZACION",
    "",
    "YAIZA", "YAEL", "JOEL",
    "",
    "SOLICITUD AUTORIZADA",
    "",
    "TENEIS 3 MINUTOS PARA COMPLETAR",
    "EL JUEGO DE LAS PAREJAS SIGUIENTES",
    "PARA PASAR A LA SIGUIENTE FASE"
];

let lineIdx = 0, charIdx = 0;
const introDiv = document.getElementById("introText");

function typeLine() {
    if (lineIdx < lines.length) {
        let line = lines[lineIdx];
        if (charIdx < line.length) {
            introDiv.innerHTML += line[charIdx];
            playBip(400 + (Math.random() * 200), 0.05, 0.05);
            charIdx++;
            setTimeout(typeLine, 40);
        } else {
            introDiv.innerHTML += "<br>";
            lineIdx++;
            charIdx = 0;
            setTimeout(typeLine, ["YAIZA", "YAEL", "JOEL"].includes(line) ? 800 : 300);
        }
    } else {
        document.getElementById("startBtn").style.display = "block";
    }
}

window.onclick = () => {
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
        introDiv.innerHTML = "";
        playBip(100, 1.5, 0.1); // Sonido de entrada
        typeLine();
        window.onclick = null;
    }
};

const icons = ["🏝️","🏖️","🥥","🍹","🍍","🌊","☀️","🚢","🎄","🎅","🎁","❄️","🌟","🔔","🍪","🕯️","🎆","🍾"];
let selected = [], matchedCount = 0, timeLeft = 180, timerInterval;

function startGame() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("game").style.display = "flex";
    startTensionBips();

    let deck = [];
    for(let i=0; i<18; i++) {
        deck.push({ id: i, icon: icons[i] });
        deck.push({ id: i, icon: icons[i] });
    }
    deck.sort(() => Math.random() - 0.5);

    const grid = document.getElementById("grid");
    deck.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.id = item.id;
        card.innerHTML = `<span class="inner">${item.icon}</span>`;
        card.onclick = () => {
            if(selected.length < 2 && !card.classList.contains('flipped')) {
                playBip(600, 0.1, 0.2);
                card.classList.add('flipped');
                selected.push(card);
                if(selected.length === 2) setTimeout(checkMatch, 500);
            }
        };
        grid.appendChild(card);
    });

    timerInterval = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        document.getElementById("timer").innerText = `${m}:${s < 10 ? '0'+s : s}`;
        if(timeLeft <= 0) location.reload();
    }, 1000);
}

function checkMatch() {
    const [a, b] = selected;
    if (a.dataset.id === b.dataset.id) {
        playBip(1000, 0.2, 0.3);
        a.classList.add('matched'); b.classList.add('matched');
        matchedCount++;
        if(matchedCount === 18) win();
    } else {
        playBip(150, 0.2, 0.2);
        a.classList.remove('flipped'); b.classList.remove('flipped');
    }
    selected = [];
}

function win() {
    clearInterval(timerInterval);
    clearInterval(tensionInterval);
    document.getElementById("game").style.display = "none";
    document.getElementById("final").style.display = "flex";
    
    // Sonido de victoria
    playBip(800, 0.5, 0.2);
    setTimeout(() => playBip(1200, 0.5, 0.2), 200);

    const target = new Date("2026-12-26T00:00:00").getTime();
    setInterval(() => {
        const diff = target - Date.now();
        const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
        document.getElementById("countdown").innerText = `${d}d ${h}h ${m}m ${s}s`;
        playBip(1000, 0.05, 0.02); // Bip de reloj final
    }, 1000);
}
</script>
</body>
</html>
