<!DOCTYPE html>

<meta charset="UTF-8">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;

  color:white;

#intro{

  inset:0;

    linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.9)),

  font-weight:bold;

  cursor:pointer;

  box-shadow:0 0 25px rgba(255,209,102,.7);

#game{
  display:none;

  width:100vw;
  height:100vh;

  justify-content:center;

  background:

    url("https://images.unsplash.com/photo-1519046904884-53103b34b206?q=80&w=1600&auto=format&fit=crop")

  text-shadow:0 0 15px black;
}

  font-size:24px;

  font-weight:bold;

<!-- 🎬 INTRO -->
<div id="intro">

  <div id="introText"></div>

  <button id="startBtn" onclick="startGame()">
    EMPEZAR
  </button>

</div>

<!-- 🎮 GAME -->
<div id="game">

  <div id="top">

    <div id="title">
      ENCUENTRA TODAS LAS PAREJAS
    </div>

    <div id="timer">
      TIEMPO RESTANTE: 06:00
    </div>

  </div>

  <div id="grid"></div>

</div>

<!-- 🔓 FINAL -->
<div id="final">

  <h2>❤️ RECUERDOS DESBLOQUEADOS ❤️</h2>

  <p>
    CUANDO CALCULÉIS CUÁNDO ACABA LA CUENTA ATRÁS,
    HACED CLICK EN EL ENLACE.
  </p>

  <div id="countdown"></div>

</div>

<script>

/* 🔊 AUDIO */
const audio = new (window.AudioContext || window.webkitAudioContext)();

function bip(freq,time){

  let osc = audio.createOscillator();
  let gain = audio.createGain();

  osc.frequency.value = freq;
  osc.type = "square";

  gain.gain.value = 0.03;

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.start();
  osc.stop(audio.currentTime + time);
}

/* 🎧 MÚSICA */
function startMusic(){

  let osc = audio.createOscillator();
  let gain = audio.createGain();

  osc.type = "sine";
  osc.frequency.value = 110;

  gain.gain.value = 0.015;

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.start();

  setInterval(()=>{
    osc.frequency.value = 90 + Math.random()*40;
  },900);
}

/* 🎬 TEXTO INTRO */
const introText = document.getElementById("introText");
const startBtn = document.getElementById("startBtn");

const message =
`DETECTANDO USUARIOS CONECTADOS
PARA VERIFICAR AUTORIZACION...............


YAIZA......

YAEL......

JOEL............


SOLICITUD AUTORIZADA


TENEIS 6 MINUTOS PARA COMPLETAR
EL JUEGO DE LAS PAREJAS SIGUIENTES
PARA PASAR A LA SIGUIENTE FASE`;

let index = 0;

function typeText(){

  if(index < message.length){

    introText.innerHTML += message[index];

    if(message[index] !== " " && message[index] !== "\n"){
      bip(180 + Math.random()*120,0.02);
    }

    index++;

    setTimeout(typeText,35);

  }else{

    setTimeout(()=>{
      startBtn.style.display = "block";
    },700);
  }
}

typeText();

/* 📸 IMÁGENES */
const images = [

"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=800&auto=format&fit=crop",
"https://images.unsplash.com/photo-1493558103817-58b2924bce98?q=80&w=800&auto=format&fit=crop",
"https://images.unsplash.com/photo-1519046904884-53103b34b206?q=80&w=800&auto=format&fit=crop",
"https://images.unsplash.com/photo-1500375592092-40eb2168fd21?q=80&w=800&auto=format&fit=crop",
"https://images.unsplash.com/photo-1473116763249-2faaef81ccda?q=80&w=800&auto=format&fit=crop",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800&auto=format&fit=crop",
"https://images.unsplash.com/photo-1483683804023-6ccdb62f86ef?q=80&w=800&auto=format&fit=crop",
"https://images.unsplash.com/photo-1467810563316-b5476525c0f9?q=80&w=800&auto=format&fit=crop"

];

let cards = [];
let selected = [];
let matched = 0;
let lockBoard = false;

let time = 360;
let timerInterval;

/* 🎮 START GAME */
function startGame(){

  document.getElementById("intro").style.display = "none";
  document.getElementById("game").style.display = "flex";

  startMusic();

  generateCards();
  renderCards();

  timerInterval = setInterval(updateTimer,1000);
}

/* 🔁 GENERATE */
function generateCards(){

  cards = [];

  for(let i=0;i<50;i++){

    let img = images[Math.floor(Math.random()*images.length)];

    cards.push({
      unique:i+"a",
      pair:i,
      img
    });

    cards.push({
      unique:i+"b",
      pair:i,
      img
    });
  }

  cards.sort(()=>Math.random()-0.5);
}

/* 🎨 RENDER */
function renderCards(){

  const grid = document.getElementById("grid");

  grid.innerHTML = "";

  cards.forEach(card=>{

    let div = document.createElement("div");

    div.className = "card";

    div.dataset.pair = card.pair;
    div.dataset.unique = card.unique;
    div.dataset.img = card.img;

    div.onclick = ()=>flip(div);

    grid.appendChild(div);
  });
}

/* 🔄 FLIP */
function flip(card){

  if(lockBoard) return;

  if(card.querySelector("img")) return;

  if(selected.includes(card)) return;

  bip(320,0.04);

  let img = document.createElement("img");
  img.src = card.dataset.img;

  card.appendChild(img);

  selected.push(card);

  if(selected.length === 2){

    lockBoard = true;

    setTimeout(checkMatch,700);
  }
}

/* ✔ CHECK */
function checkMatch(){

  const [a,b] = selected;

  if(a.dataset.pair === b.dataset.pair){

    matched += 2;

    bip(800,0.08);

    selected = [];
    lockBoard = false;

    if(matched === 100){
      win();
    }

  }else{

    bip(120,0.1);

    setTimeout(()=>{

      a.innerHTML = "";
      b.innerHTML = "";

      selected = [];
      lockBoard = false;

    },300);
  }
}

/* ⏳ TIMER */
function updateTimer(){

  time--;

  let m = Math.floor(time/60);
  let s = time%60;

  let txt = `${m}:${s<10?"0"+s:s}`;

  document.getElementById("timer").innerText =
    `TIEMPO RESTANTE: ${txt}`;

  if(time <= 0){

    alert("⏳ TIEMPO AGOTADO - REINICIANDO SISTEMA");

    location.reload();
  }
}

/* ❤️ WIN */
function win(){

  clearInterval(timerInterval);

  document.getElementById("game").style.display = "none";
  document.getElementById("final").style.display = "flex";

  const target =
    new Date("2026-12-26T00:00:00").getTime();

  setInterval(()=>{

    let now = Date.now();

    let diff = target - now;

    let days = Math.floor(diff / 86400000);

    let hours =
      Math.floor((diff % 86400000)/3600000);

    let mins =
      Math.floor((diff % 3600000)/60000);

    let secs =
      Math.floor((diff % 60000)/1000);

    document.getElementById("countdown").innerText =
      `${days}d ${hours}h ${mins}m ${secs}s`;

  },1000);
}

</script>

</body>
</html>
