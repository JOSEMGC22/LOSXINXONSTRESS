<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SYSTEM ACCESS</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  color: white;
  overflow-x: hidden;
  background: black;
}

/* 🎬 INTRO NETFLIX */
#intro {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: radial-gradient(circle, #0a0a0a, black);
}

#logo {
  font-size: 40px;
  letter-spacing: 6px;
  opacity: 0;
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
  to {opacity: 1;}
}

#loading {
  margin-top: 20px;
  color: #00ffcc;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity: 0.3;}
}

/* BUTTON */
button {
  margin-top: 25px;
  padding: 14px 26px;
  font-size: 16px;
  background: #00ffcc;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 0 20px #00ffcc;
  display: none;
}

/* GAME */
#game {
  display: none;
  height: 100vh;
  flex-direction: column;
  justify-content: center;
  background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #00c9ff);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* TIMER */
#timerTop {
  text-align: center;
  font-size: 20px;
  margin-top: 10px;
  color: #00ffcc;
}

/* 🎮 GRID 12x12 */
#grid {
  display: grid;
  grid-template-columns: repeat(12, 52px);
  gap: 5px;
  justify-content: center;
  margin: auto;
  padding: 20px;
}

.card {
  width: 52px;
  height: 52px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  border-radius: 10px;
  cursor: pointer;
}

/* SECRET */
#secret {
  display: none;
  text-align: center;
  padding: 40px;
}

#bigTimer {
  font-size: 32px;
  margin: 20px;
}

a {
  color: #00ffcc;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- 🎬 INTRO NETFLIX -->
<div id="intro">
  <div id="logo">SYSTEM ACCESS</div>
  <div id="loading">CARGANDO SISTEMA...</div>
  <button id="startBtn">INICIAR DESBLOQUEO</button>
</div>

<!-- 🎮 GAME -->
<div id="game">
  <div id="timerTop"></div>
  <div id="grid"></div>
</div>

<!-- 🔓 FINAL -->
<div id="secret">
  <h2>🔓 ACCESS GRANTED</h2>
  <p>CUANDO CALCULEIS CUANDO ACABA LA CUENTA ATRAS, DARLE AL LINK DE ABAJO</p>
  <div id="bigTimer"></div>
  <a href="https://TU-LINK-AQUI.COM" target="_blank">IR AL VIDEO</a>
</div>

<script>

/* 🎧 MÚSICA ÉPICA CONTINUA */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playMusic(){
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.type = "sawtooth";
  osc.frequency.value = 55;

  gain.gain.value = 0.03;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  // modulación tipo “tensión”
  setInterval(()=>{
    osc.frequency.value = 55 + Math.random()*20;
  },500);
}

document.getElementById("startBtn").onclick = startGame;

/* 🎬 INTRO DELAY */
setTimeout(()=>{
  document.getElementById("startBtn").style.display = "block";
},3000);

/* 🎮 GAME DATA */
const emojis = [
"🏖️","🌴","☀️","🌊","🍹","🕶️",
"⛱️","🏊","🎆","🍇","🥂","🎉"
];

let cards = [];
let selected = [];
let matched = 0;

let time = 360;
let interval;
let active = false;

/* START */
function startGame(){
  playMusic();

  document.getElementById("intro").style.display = "none";
  document.getElementById("game").style.display = "flex";

  generate();
  render();

  interval = setInterval(timer,1000);
  active = true;
}

/* GENERATE 12x12 = 144 (72 parejas) */
function generate(){
  cards = [];
  for(let i=0;i<72;i++){
    let e = emojis[Math.floor(Math.random()*emojis.length)];
    cards.push({id:i*2,e});
    cards.push({id:i*2+1,e});
  }
  cards.sort(()=>Math.random()-0.5);
}

/* RENDER */
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cards.forEach(c=>{
    let d = document.createElement("div");
    d.className = "card";
    d.dataset.e = c.e;
    d.dataset.id = c.id;
    d.innerText = "";
    d.onclick = ()=>flip(d);
    grid.appendChild(d);
  });
}

/* FLIP */
function flip(card){
  if(!active || card.innerText || selected.length===2) return;

  card.innerText = card.dataset.e;
  selected.push(card);

  if(selected.length===2){
    setTimeout(check,300);
  }
}

/* CHECK */
function check(){
  if(selected[0].dataset.e === selected[1].dataset.e &&
     selected[0].dataset.id !== selected[1].dataset.id){
    matched += 2;
  } else {
    selected.forEach(c=>c.innerText="");
  }

  selected = [];

  if(matched === 144){
    win();
  }
}

/* ⏳ TIMER */
function timer(){
  time--;

  let m = Math.floor(time/60);
  let s = time%60;

  document.getElementById("timerTop").innerText =
    `TIEMPO RESTANTE: ${m}:${s<10?"0"+s:s}`;

  if(time<=0){
    location.reload();
  }
}

/* 🔓 WIN */
function win(){
  active = false;
  clearInterval(interval);

  document.getElementById("game").style.display = "none";
  document.getElementById("secret").style.display = "block";

  const target = new Date("2026-12-26T00:00:00").getTime();

  setInterval(()=>{
    let now = Date.now();
    let d = target - now;

    let days = Math.floor(d/86400000);
    let hours = Math.floor((d%86400000)/3600000);
    let mins = Math.floor((d%3600000)/60000);
    let secs = Math.floor((d%60000)/1000);

    document.getElementById("bigTimer").innerText =
      `${days}d ${hours}h ${mins}m ${secs}s`;
  },1000);
}

</script>

</body>
</html>
