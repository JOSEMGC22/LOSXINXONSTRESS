<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SYSTEM ACCESS</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  color: white;
  overflow-x: hidden;

  background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #00c9ff);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* INTRO */
#intro {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

#terminal {
  white-space: pre-line;
  font-size: 14px;
  max-width: 90%;
  text-shadow: 0 0 10px black;
}

button {
  margin-top: 20px;
  padding: 14px 26px;
  font-size: 16px;
  background: #00ffcc;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 0 20px #00ffcc;
}

/* GAME */
#game {
  display: none;
  height: 100vh;
  flex-direction: column;
  justify-content: center;
}

#timerTop {
  text-align: center;
  font-size: 18px;
  margin-top: 10px;
  text-shadow: 0 0 10px black;
}

/* GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(16, 38px);
  gap: 4px;
  justify-content: center;
  align-content: center;
  margin: auto;
  padding: 20px;
}

.card {
  width: 38px;
  height: 38px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.2s;
  user-select: none;
}

.card:hover {
  transform: scale(1.1);
  box-shadow: 0 0 10px #00ffcc;
}

/* SECRET */
#secret {
  display: none;
  text-align: center;
  padding: 40px;
}

#bigTimer {
  font-size: 32px;
  margin: 20px;
  text-shadow: 0 0 10px black;
}

a {
  color: #00ffcc;
  font-size: 20px;
  text-shadow: 0 0 10px black;
}
</style>
</head>

<body>

<div id="intro">
  <div id="terminal"></div>
  <button id="startBtn" style="display:none">INICIAR ACCESO</button>
</div>

<div id="game">
  <div id="timerTop"></div>
  <div id="grid"></div>
</div>

<div id="secret">
  <h2>🔓 ACCESS GRANTED</h2>
  <p>CUANDO CALCULEIS CUANDO ACABA LA CUENTA ATRAS, DARLE AL LINK DE ABAJO</p>
  <div id="bigTimer"></div>
  <a href="https://TU-LINK-AQUI.COM" target="_blank">IR AL VIDEO</a>
</div>

<script>

/* 🔊 AUDIO */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(f,t){
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();
  o.frequency.value = f;
  o.type = "square";
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + t);
}

/* 💻 INTRO TYPE */
const terminal = document.getElementById("terminal");

const text =
`INICIANDO SISTEMA...
CARGANDO INTERFAZ...
FIREWALL: OK
SISTEMA: ESTABLE
DESBLOQUEO DISPONIBLE`;

let i = 0;

function type(){
  if(i < text.length){
    terminal.innerHTML += text[i];
    if(i % 2 === 0) beep(200 + Math.random()*300, 0.02);
    i++;
    setTimeout(type, 35);
  } else {
    document.getElementById("startBtn").style.display = "block";
  }
}
type();

/* 🎮 GAME */
const emojis = [
"🏖️","🌴","☀️","🌊","🍹","🕶️","⛱️","🏊",
"🎆","🍇","🥂","🎉","🌅","🌙","✨","🍾"
];

let cards = [];
let selected = [];
let matched = 0;
let time = 360;
let interval;
let active = false;

document.getElementById("startBtn").onclick = startGame;

function startGame(){
  beep(600,0.1);
  document.getElementById("intro").style.display = "none";
  document.getElementById("game").style.display = "flex";

  generate();
  render();

  interval = setInterval(timer,1000);
  active = true;
}

function generate(){
  cards = [];
  for(let i=0;i<128;i++){
    let e = emojis[Math.floor(Math.random()*emojis.length)];
    cards.push({id:i*2,e});
    cards.push({id:i*2+1,e});
  }
  cards.sort(()=>Math.random()-0.5);
}

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cards.forEach(c=>{
    let d = document.createElement("div");
    d.className = "card";
    d.innerText = "";
    d.dataset.e = c.e;
    d.dataset.id = c.id;
    d.onclick = ()=>flip(d);
    grid.appendChild(d);
  });
}

function flip(card){
  if(!active || card.innerText || selected.length===2) return;

  card.innerText = card.dataset.e;
  beep(300,0.05);
  selected.push(card);

  if(selected.length===2){
    setTimeout(check,300);
  }
}

function check(){
  if(selected[0].dataset.e === selected[1].dataset.e &&
     selected[0].dataset.id !== selected[1].dataset.id){
    matched += 2;
    beep(800,0.1);
  } else {
    selected.forEach(c=>c.innerText="");
    beep(150,0.1);
  }

  selected = [];

  if(matched === 256){
    win();
  }
}

/* ⏳ TIMER */
function timer(){
  time--;

  let m = Math.floor(time/60);
  let s = time%60;

  document.getElementById("timerTop").innerText =
    `TIEMPO: ${m}:${s<10?"0"+s:s}`;

  if(time<=0){
    reset();
  }
}

function reset(){
  beep(100,0.3);
  active = false;
  clearInterval(interval);
  alert("💥 SYSTEM RESET");
  location.reload();
}

/* 🔓 WIN */
function win(){
  active = false;
  clearInterval(interval);
  beep(1000,0.2);
  setTimeout(()=>beep(1200,0.2),200);
  setTimeout(()=>beep(1400,0.3),400);

  document.getElementById("game").style.display = "none";
  document.getElementById("secret").style.display = "block";

  const target = new Date("2026-12-26T00:00:00").getTime();

  setInterval(()=>{
    let now = Date.now();
    let d = target - now;

    let days = Math.floor(d/86400000);
    let hours = Math.floor((d%86400000)/3600000);
    let mins = Math.floor((d%3600000)/60000);
    let secs = Math.floor((d%60000)/1000);

    document.getElementById("bigTimer").innerText =
      `${days}d ${hours}h ${mins}m ${secs}s`;
  },1000);
}

</script>

</body>
</html>
