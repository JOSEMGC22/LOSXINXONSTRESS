<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuenta Atrás</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      font-family:Arial, sans-serif;
      background:black;
      color:white;
      text-align:center;
      position:relative;
    }

    /* Fondo animado */
    body::before{
      content:"";
      position:absolute;
      width:200%;
      height:200%;
      background:
        radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size:50px 50px;
      animation:mover 40s linear infinite;
      z-index:-2;
    }

    @keyframes mover{
      from{
        transform:translate(0,0);
      }
      to{
        transform:translate(-500px,-500px);
      }
    }

    /* Oscurecido cinematográfico */
    .overlay{
      position:absolute;
      width:100%;
      height:100%;
      background:radial-gradient(circle, transparent 20%, black 90%);
      z-index:-1;
    }

    h1{
      font-size:5rem;
      letter-spacing:8px;
      margin-bottom:30px;
      text-shadow:0 0 20px rgba(255,255,255,0.5);
      animation:parpadeo 3s infinite;
    }

    @keyframes parpadeo{
      0%,100%{
        opacity:1;
      }
      50%{
        opacity:0.7;
      }
    }

    #countdown{
      font-size:4rem;
      font-weight:bold;
      margin-bottom:40px;
      text-shadow:0 0 25px rgba(255,0,0,0.8);
      color:#ff4444;
    }

    .mensaje{
      max-width:900px;
      font-size:1.3rem;
      letter-spacing:2px;
      margin-bottom:35px;
      opacity:0.9;
      line-height:1.6;
    }

    .qr{
      background:white;
      padding:15px;
      border-radius:20px;
      box-shadow:0 0 35px rgba(255,255,255,0.4);
      transition:0.3s;
    }

    .qr:hover{
      transform:scale(1.05);
    }

    .qr img{
      width:220px;
      height:220px;
      display:block;
    }

    .footer{
      position:absolute;
      bottom:20px;
      font-size:0.8rem;
      opacity:0.4;
      letter-spacing:3px;
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <h1>31 · 12 · 2026</h1>

  <div id="countdown">CARGANDO...</div>

  <div class="mensaje">
    CUANDO CALCULÉIS CUÁNDO ACABA LA CUENTA ATRÁS<br>
    MIRAD EL QR CON EL MÓVIL
  </div>

  <!-- CAMBIA ESTE LINK -->
  <div class="qr">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://google.com">
  </div>

  <div class="footer">
    EL TIEMPO SE ACABA
  </div>

  <script>
    const targetDate = new Date("December 31, 2026 23:59:59").getTime();

    const countdown = setInterval(() => {

      const now = new Date().getTime();
      const distance = targetDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("countdown").innerHTML =
        `${days}D ${hours}H ${minutes}M ${seconds}S`;

      if(distance < 0){
        clearInterval(countdown);
        document.getElementById("countdown").innerHTML = "00D 00H 00M 00S";
      }

    },1000);
  </script>

</body>
</html>
