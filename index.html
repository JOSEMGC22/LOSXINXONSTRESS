<script>

/* 🔊 AUDIO */
const audio = new (window.AudioContext || window.webkitAudioContext)();

function bip(freq,time){

  let osc = audio.createOscillator();
  let gain = audio.createGain();

  osc.frequency.value = freq;
  osc.type = "square";

  gain.gain.value = 0.03;

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.start();
  osc.stop(audio.currentTime + time);
}

/* 🎧 MUSICA */
function startMusic(){

  let osc = audio.createOscillator();
  let gain = audio.createGain();

  osc.type = "sine";
  osc.frequency.value = 110;

  gain.gain.value = 0.015;

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.start();

  setInterval(()=>{

    osc.frequency.value =
      90 + Math.random()*40;

  },900);
}

/* 🎬 INTRO TEXTO MÁS LENTO */
const introText =
  document.getElementById("introText");

const startBtn =
  document.getElementById("startBtn");

const message =
`DETECTANDO USUARIOS CONECTADOS
PARA VERIFICAR AUTORIZACION

YAIZA
YAEL
JOEL

SOLICITUD AUTORIZADA

TENEIS 6 MINUTOS PARA COMPLETAR
EL JUEGO DE LAS PAREJAS SIGUIENTES
PARA PASAR A LA SIGUIENTE FASE`;

let index = 0;

function typeText(){

  if(index < message.length){

    introText.innerHTML += message[index];

    if(
      message[index] !== " " &&
      message[index] !== "\n"
    ){

      bip(
        180 + Math.random()*120,
        0.02
      );
    }

    index++;

    // ⬅ MÁS LENTO
    setTimeout(typeText,55);

  }else{

    setTimeout(()=>{

      startBtn.style.display = "block";

    },800);
  }
}

typeText();

/* 📸 IMAGENES */
const images = [

"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=800&auto=format&fit=crop",

"https://images.unsplash.com/photo-1493558103817-58b2924bce98?q=80&w=800&auto=format&fit=crop",

"https://images.unsplash.com/photo-1519046904884-53103b34b206?q=80&w=800&auto=format&fit=crop",

"https://images.unsplash.com/photo-1500375592092-40eb2168fd21?q=80&w=800&auto=format&fit=crop",

"https://images.unsplash.com/photo-1473116763249-2faaef81ccda?q=80&w=800&auto=format&fit=crop",

"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800&auto=format&fit=crop",

"https://images.unsplash.com/photo-1483683804023-6ccdb62f86ef?q=80&w=800&auto=format&fit=crop",

"https://images.unsplash.com/photo-1467810563316-b5476525c0f9?q=80&w=800&auto=format&fit=crop"

];

let cards = [];
let selected = [];
let matched = 0;
let lockBoard = false;

let time = 360;
let timerInterval;

/* 🎮 START */
function startGame(){

  document.getElementById("intro")
    .style.display = "none";

  document.getElementById("game")
    .style.display = "flex";

  startMusic();

  generateCards();

  renderCards();

  timerInterval =
    setInterval(updateTimer,1000);
}

/* 🔁 GENERAR */
function generateCards(){

  cards = [];

  // ✅ parejas reales
  for(let i=0;i<50;i++){

    let img =
      images[
        i % images.length
      ];

    cards.push({

      id:"a"+i,
      pair:i,
      img,
      matched:false

    });

    cards.push({

      id:"b"+i,
      pair:i,
      img,
      matched:false

    });
  }

  cards.sort(()=>Math.random()-0.5);
}

/* 🎨 RENDER */
function renderCards(){

  const grid =
    document.getElementById("grid");

  grid.innerHTML = "";

  cards.forEach(card=>{

    let div =
      document.createElement("div");

    div.className = "card";

    div.dataset.pair = card.pair;

    div.dataset.id = card.id;

    div.dataset.img = card.img;

    div.dataset.matched = "false";

    div.onclick = ()=>flip(div);

    grid.appendChild(div);
  });
}

/* 🔄 GIRAR */
function flip(card){

  if(lockBoard) return;

  // ✅ si ya esta descubierta
  if(card.querySelector("img")) return;

  // ✅ si ya esta emparejada
  if(card.dataset.matched === "true") return;

  bip(320,0.04);

  let img =
    document.createElement("img");

  img.src = card.dataset.img;

  card.appendChild(img);

  selected.push(card);

  if(selected.length === 2){

    lockBoard = true;

    setTimeout(checkMatch,900);
  }
}

/* ✔ COMPROBAR */
function checkMatch(){

  const [a,b] = selected;

  // ✅ misma pareja y no misma carta
  if(
    a.dataset.pair === b.dataset.pair &&
    a.dataset.id !== b.dataset.id
  ){

    // ✅ quedan fijas
    a.dataset.matched = "true";
    b.dataset.matched = "true";

    matched += 2;

    bip(800,0.08);

    selected = [];

    lockBoard = false;

    if(matched === 100){

      win();
    }

  }else{

    bip(120,0.1);

    setTimeout(()=>{

      a.innerHTML = "";
      b.innerHTML = "";

      selected = [];

      lockBoard = false;

    },400);
  }
}

/* ⏳ TIMER */
function updateTimer(){

  time--;

  let m =
    Math.floor(time/60);

  let s =
    time%60;

  let txt =
    `${m}:${s<10?"0"+s:s}`;

  document.getElementById("timer")
    .innerText =
      `TIEMPO RESTANTE: ${txt}`;

  if(time <= 0){

    alert(
      "⏳ TIEMPO AGOTADO - REINICIANDO SISTEMA"
    );

    location.reload();
  }
}

/* ❤️ FINAL */
function win(){

  clearInterval(timerInterval);

  document.getElementById("game")
    .style.display = "none";

  document.getElementById("final")
    .style.display = "flex";

  const target =
    new Date("2026-12-26T00:00:00")
      .getTime();

  setInterval(()=>{

    let now = Date.now();

    let diff =
      target - now;

    let days =
      Math.floor(diff / 86400000);

    let hours =
      Math.floor(
        (diff % 86400000)/3600000
      );

    let mins =
      Math.floor(
        (diff % 3600000)/60000
      );

    let secs =
      Math.floor(
        (diff % 60000)/1000
      );

    document.getElementById("countdown")
      .innerText =
        `${days}d ${hours}h ${mins}m ${secs}s`;

  },1000);
}

</script>
