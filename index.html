<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE VERIFICACIÓN DE PAREJAS</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --dark-bg: #0a0a0a;
            --grid-size: 10; /* 10x10 = 100 cartas */
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: uppercase;
        }

        /* Efecto scanlines CRT */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        #intro, #game, #final {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 800px;
        }

        #introText {
            font-size: 1.2rem;
            line-height: 1.5;
            min-height: 200px;
            text-shadow: 0 0 5px var(--neon-green);
        }

        .btn {
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 15px 30px;
            font-family: inherit;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            display: none;
            z-index: 20; /* Asegurar que el botón esté sobre el efecto CRT */
        }

        .btn:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }

        /* Grid de Juego */
        #gridContainer {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), 1fr);
            gap: 5px;
            width: 100%;
            max-width: 650px; /* Limitar el ancho máximo para que no se deforme */
        }

        .card {
            aspect-ratio: 1 / 1; /* Mantener formato cuadrado */
            border: 1px solid var(--neon-green);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background: #111;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #222;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            visibility: hidden; /* Ocultar imagen inicialmente */
        }

        .card.flipped img {
            visibility: visible; /* Mostrar imagen al voltear */
        }

        .card.matched {
            border: none;
            background: transparent;
            cursor: default;
        }
        
        .card.matched img {
            visibility: hidden; /* Ocultar imagen de nuevo al acertar */
        }

        #gameHeader {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        #countdown {
            font-size: 3rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="intro">
        <div id="introText"></div>
        <button id="startBtn" class="btn" onclick="startGame()">INICIAR PROTOCOLO</button>
    </div>

    <div id="game" style="display: none;">
        <div id="gameHeader">
            <span>PAREJAS: <span id="matches">0</span>/50</span>
            <span id="timer">06:00</span>
        </div>
        <div id="gridContainer">
            <div id="grid"></div>
        </div>
    </div>

    <div id="final" style="display: none;">
        <h2>ACCESO TOTAL CONCEDIDO</h2>
        <p>REINICIO DE SISTEMA EN:</p>
        <div id="countdown"></div>
    </div>

<script>
/* 🔊 MOTOR DE AUDIO Y SONIDOS */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, duration, vol, rampType = 'linear') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    if (rampType === 'exponential') {
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    } else {
        gain.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    }

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

// Sonido complejo de fax/router antiguo
function playFaxSound() {
    let startTime = audioCtx.currentTime;
    for(let i=0; i<15; i++) {
        let f1 = 800 + Math.random() * 1000;
        let f2 = 1200 + Math.random() * 800;
        playSound(f1, 'sine', 0.1, 0.02);
        playSound(f2, 'sawtooth', 0.1, 0.01);
        startTime += 0.05 + Math.random() * 0.1;
    }
}

/* 🖼️ TUS IMÁGENES AQUÍ (LINKS DIRECTOS .jpg) */
// Asegúrate de que estos enlaces terminan en .jpg
const images = [
    "https://i.imgur.com/uR1k3Rk.jpg",
    "https://i.imgur.com/jIisXNn.jpg",
    "https://i.imgur.com/7Yf9h9p.jpg",
    "https://i.imgur.com/vH0HhH0.jpg",
    "https://i.imgur.com/T0bC0L0.jpg",
    "https://i.imgur.com/8Yh5j8j.jpg",
    "https://i.imgur.com/kP8K9k9.jpg",
    "https://i.imgur.com/mZ2Z3Z3.jpg"
];

/* ✍️ LÓGICA DE ESCRITURA CINEMATOGRÁFICA */
const lines = [
    "CONECTANDO CON EL SERVIDOR CENTRAL... [OK]",
    "ESTABLECIENDO PROTOCOLO SEGURO...",
    "VERIFICANDO CREDENCIALES BIOMÉTRICAS...",
    "",
    "USUARIOS DETECTADOS EN LA ZONA:",
    "> YAIZA",
    "> YAEL",
    "> JOEL",
    "",
    "SOLICITUD DE ACCESO Nivel IV: AUTORIZADA",
    "",
    "ATENCIÓN: EL SISTEMA SE BLOQUEARÁ EN 6 MINUTOS.",
    "RESOLVED EL ACERTIJO DE PAREJAS PARA CONTINUAR."
];

let lineIdx = 0, charIdx = 0;
const introDiv = document.getElementById("introText");

function type() {
    if (lineIdx < lines.length) {
        let currentLine = lines[lineIdx];
        if (charIdx < currentLine.length) {
            introDiv.innerHTML += currentLine[charIdx];
            // Sonido de "bip" corto por carácter
            playSound(200 + Math.random() * 100, 'square', 0.05, 0.01, 'exponential');
            charIdx++;
            setTimeout(type, 40);
        } else {
            introDiv.innerHTML += "<br>";
            lineIdx++;
            charIdx = 0;
            let delay = currentLine.includes(">") ? 1000 : 400;
            setTimeout(type, delay);
        }
    } else {
        document.getElementById("startBtn").style.display = "block";
    }
}

// Iniciar escritura y sonido de fax al cargar
window.onload = () => {
    playFaxSound();
    setTimeout(type, 1500); // Dar tiempo al sonido de fax
};

/* 🎮 LÓGICA DEL JUEGO DE MEMORIA */
let cards = [], selected = [], matchedCount = 0, timeLeft = 360; // 6 minutos en segundos
let lockBoard = false, timerInterval;

function startGame() {
    audioCtx.resume(); // Necesario para navegadores modernos
    document.getElementById("intro").style.display = "none";
    document.getElementById("game").style.display = "flex";
    
    setupBoard();
    timerInterval = setInterval(updateTimer, 1000);
}

function setupBoard() {
    // Generar 100 cartas (50 parejas) cíclicamente usando las imágenes disponibles
    let deck = [];
    for(let i=0; i<50; i++) {
        let img = images[i % images.length];
        deck.push({ id: i, img: img });
        deck.push({ id: i, img: img });
    }
    cards = deck.sort(() => Math.random() - 0.5);

    const grid = document.getElementById("grid");
    cards.forEach((card, index) => {
        const div = document.createElement("div");
        div.className = "card";
        div.dataset.id = card.id;
        div.innerHTML = `<img src="${card.img}">`;
        div.onclick = () => flipCard(div);
        grid.appendChild(div);
    });
}

function flipCard(el) {
    if (lockBoard || el.classList.contains('flipped') || el.classList.contains('matched')) return;

    // Bip medio al voltear
    playSound(440, 'sine', 0.1, 0.03, 'exponential');
    el.classList.add('flipped');
    selected.push(el);

    if (selected.length === 2) {
        lockBoard = true;
        setTimeout(checkMatch, 600);
    }
}

function checkMatch() {
    const [c1, c2] = selected;
    if (c1.dataset.id === c2.dataset.id) {
        // Sonido agudo de acierto
        playSound(880, 'sine', 0.2, 0.04, 'exponential');
        c1.classList.add('matched');
        c2.classList.add('matched');
        matchedCount++;
        document.getElementById("matches").innerText = matchedCount;
        selected = [];
        lockBoard = false;
        if (matchedCount === 50) win();
    } else {
        // Sonido grave de fallo
        playSound(150, 'sawtooth', 0.2, 0.03, 'exponential');
        setTimeout(() => {
            c1.classList.remove('flipped');
            c2.classList.remove('flipped');
            selected = [];
            lockBoard = false;
        }, 400);
    }
}

function updateTimer() {
    timeLeft--;
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    document.getElementById("timer").innerText = `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
    
    if (timeLeft <= 0) {
        clearInterval(timerInterval);
        alert("SISTEMA BLOQUEADO. REINICIANDO PROTOCOLO...");
        location.reload();
    }
}

function win() {
    clearInterval(timerInterval);
    document.getElementById("game").style.display = "none";
    document.getElementById("final").style.display = "flex";
    // Sonido final triunfal rápido
    playFaxSound();
    
    // Cuenta regresiva final simulada (puedes ajustar la fecha)
    const target = new Date("2026-12-26T00:00:00").getTime();
    setInterval(() => {
        const diff = target - Date.now();
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById("countdown").innerText = `${d}d ${h}h ${m}m ${s}s`;
    }, 1000);
}
</script>
</body>
</html>
