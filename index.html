<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE VERIFICACIÓN PRO</title>
    <style>
        :root {
            --neon: #39ff14;
            --neon-glow: rgba(57, 255, 20, 0.3);
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--dark);
            color: var(--neon);
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: uppercase;
        }

        /* Scanlines y Vignette Moderno */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%),
                radial-gradient(circle, transparent 20%, black 150%);
            background-size: 100% 4px, 100% 100%;
            z-index: 100;
            pointer-events: none;
        }

        #intro, #game, #final {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 95%;
            height: 90vh; /* Ajuste para que no se corte en portátiles */
            justify-content: center;
        }

        #introText {
            font-size: clamp(1rem, 2vw, 1.4rem);
            line-height: 1.6;
            text-shadow: 0 0 10px var(--neon);
            text-align: center;
            max-width: 800px;
        }

        .btn {
            background: var(--neon);
            color: black;
            border: none;
            padding: 15px 40px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 4px;
            box-shadow: 0 0 20px var(--neon-glow);
            transition: 0.3s;
            display: none;
            z-index: 110;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px var(--neon);
        }

        /* Grid Moderno y Rectangular */
        #grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 900px;
            max-height: 70vh; /* Limita la altura para evitar scroll */
            padding: 10px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--neon-glow);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            transition: all 0.2s ease-out;
            aspect-ratio: 1.2 / 1; /* Formato algo más rectangular */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .card:hover {
            background: rgba(57, 255, 20, 0.1);
            border-color: var(--neon);
        }

        .card .inner { 
            display: none; 
            filter: drop-shadow(0 0 5px white);
        }
        
        .card.flipped {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
            transform: translateY(-5px);
        }
        
        .card.flipped .inner { display: block; }

        .card.matched {
            opacity: 0;
            pointer-events: none;
            transition: 0.5s;
        }

        #timer {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 800;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
            border-bottom: 3px solid var(--neon);
        }

        #countdown { font-size: 4rem; }
    </style>
</head>
<body>

    <div id="intro">
        <div id="introText">HAGA CLIC PARA ESTABLECER CONEXIÓN...</div>
        <button id="startBtn" class="btn" onclick="startGame()">ACCEDER AL SISTEMA</button>
    </div>

    <div id="game" style="display: none;">
        <div id="timer">06:00</div>
        <div id="grid"></div>
    </div>

    <div id="final" style="display: none;">
        <h1 style="font-size: 3rem;">SISTEMA DESBLOQUEADO</h1>
        <p>INICIO DE FASE EN:</p>
        <div id="countdown"></div>
    </div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

/* 🔊 SONIDOS MEJORADOS (MÁS ALTOS Y BIP) */
function playBip(freq, duration, volume = 0.15) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playRouterSound() {
    const duration = 2.0;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(100, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + duration);
    
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

/* 📝 TEXTO ORIGINAL */
const lines = [
    "DETECTANDO USUARIOS CONECTADOS",
    "PARA VERIFICAR AUTORIZACION",
    "",
    "YAIZA", "YAEL", "JOEL",
    "",
    "SOLICITUD AUTORIZADA",
    "",
    "TENEIS 6 MINUTOS PARA COMPLETAR",
    "EL JUEGO DE LAS PAREJAS SIGUIENTES",
    "PARA PASAR A LA SIGUIENTE FASE"
];

let lineIdx = 0, charIdx = 0;
const introDiv = document.getElementById("introText");

function typeLine() {
    if (lineIdx < lines.length) {
        let line = lines[lineIdx];
        if (charIdx < line.length) {
            introDiv.innerHTML += line[charIdx];
            playBip(400 + (Math.random() * 200), 0.05, 0.05);
            charIdx++;
            setTimeout(typeLine, 50);
        } else {
            introDiv.innerHTML += "<br>";
            lineIdx++;
            charIdx = 0;
            let pause = line === "" ? 200 : 600;
            if(["YAIZA", "YAEL", "JOEL"].includes(line)) pause = 1000;
            setTimeout(typeLine, pause);
        }
    } else {
        document.getElementById("startBtn").style.display = "block";
    }
}

window.onclick = () => {
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
        introDiv.innerHTML = "";
        playRouterSound();
        typeLine();
        window.onclick = null;
    }
};

/* 🎮 JUEGO 8x8 */
const icons = [
    "🏝️","🏖️","🥥","🍹","🍍","🌊","☀️","🚢",
    "🎄","🎅","🎁","❄️","🌟","🔔","🍪","🕯️",
    "🎆","🍾","🥂","🎉","🎈","🕛","🍇","💃",
    "🎷","🎸","🎵","🌅","🦜","🐚","🦀","🐠"
];

let selected = [], matchedCount = 0, timeLeft = 360, timerInterval;

function startGame() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("game").style.display = "flex";
    
    let deck = [];
    for(let i=0; i<32; i++) {
        deck.push({ id: i, icon: icons[i] });
        deck.push({ id: i, icon: icons[i] });
    }
    deck.sort(() => Math.random() - 0.5);

    const grid = document.getElementById("grid");
    deck.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.id = item.id;
        card.innerHTML = `<span class="inner">${item.icon}</span>`;
        card.onclick = () => {
            if(selected.length < 2 && !card.classList.contains('flipped')) {
                playBip(600, 0.15, 0.2); // Bip más alto al tocar
                card.classList.add('flipped');
                selected.push(card);
                if(selected.length === 2) setTimeout(checkMatch, 500);
            }
        };
        grid.appendChild(card);
    });

    timerInterval = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        document.getElementById("timer").innerText = `${m}:${s < 10 ? '0'+s : s}`;
        if(timeLeft <= 0) location.reload();
    }, 1000);
}

function checkMatch() {
    const [a, b] = selected;
    if (a.dataset.id === b.dataset.id) {
        playBip(1000, 0.3, 0.25); // Bip de éxito
        a.classList.add('matched'); b.classList.add('matched');
        matchedCount++;
        if(matchedCount === 32) win();
    } else {
        playBip(200, 0.2, 0.2); // Bip de fallo
        a.classList.remove('flipped'); b.classList.remove('flipped');
    }
    selected = [];
}

function win() {
    clearInterval(timerInterval);
    document.getElementById("game").style.display = "none";
    document.getElementById("final").style.display = "flex";
    playRouterSound();
    
    const target = new Date("2026-12-26T00:00:00").getTime();
    setInterval(() => {
        const diff = target - Date.now();
        const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
        document.getElementById("countdown").innerText = `${d}d ${h}h ${m}m ${s}s`;
    }, 1000);
}
</script>
</body>
</html>
