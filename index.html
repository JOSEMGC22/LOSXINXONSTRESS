<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ACCESS SYSTEM</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: black;
  color: #00ff88;
  text-align: center;
}

/* HEADER */
#intro {
  padding: 20px;
}

button {
  padding: 12px 20px;
  background: #00ff88;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

/* TIMER */
#timerTop {
  font-size: 20px;
  margin: 10px;
}

/* GRID 16x16 */
#grid {
  display: grid;
  grid-template-columns: repeat(16, 28px);
  gap: 2px;
  justify-content: center;
  margin-top: 10px;
}

.card {
  width: 28px;
  height: 28px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
  border: 1px solid #003322;
}

/* SECRET */
#secret {
  display: none;
  margin-top: 30px;
}

#bigTimer {
  font-size: 30px;
  margin: 20px;
}

a {
  color: #00ff88;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="intro">
  <h2>SISTEMA BLOQUEADO</h2>
  <p>Encuentra todas las parejas para acceder</p>
  <button onclick="startGame()">INICIAR</button>
  <div id="timerTop"></div>
</div>

<div id="grid"></div>

<div id="secret">
  <h2>🔓 ACCESO CONCEDIDO</h2>
  <p>CUANDO CALCULEIS CUANDO ACABA LA CUENTA ATRAS, DARLE AL LINK DE ABAJO</p>
  <div id="bigTimer"></div>

  <a href="https://TU-LINK-AQUI.COM" target="_blank">
    IR AL VIDEO
  </a>
</div>

<script>
let grid = document.getElementById("grid");
let selected = [];
let matched = 0;
let time = 360; // 6 minutos
let interval;
let gameActive = false;

// emojis temática verano + nochevieja
const pool = [
"🏖️","🌴","☀️","🌊","🍹","🕶️","⛱️","🏊",
"🎆","🍇","🥂","🎉","🌅","🌙","✨","🍾"
];

// 128 parejas => 256 cartas
let cards = [];

function generateCards(){
  cards = [];
  for(let i=0;i<128;i++){
    let emoji = pool[Math.floor(Math.random()*pool.length)];
    cards.push({id:i*2, emoji});
    cards.push({id:i*2+1, emoji});
  }
  cards.sort(()=>Math.random()-0.5);
}

function startGame(){
  document.getElementById("intro").style.display = "none";
  grid.innerHTML = "";
  selected = [];
  matched = 0;
  time = 360;
  gameActive = true;

  generateCards();

  cards.forEach((c)=>{
    let div = document.createElement("div");
    div.className = "card";
    div.dataset.id = c.id;
    div.dataset.emoji = c.emoji;
    div.innerText = "";
    div.onclick = () => flip(div);
    grid.appendChild(div);
  });

  clearInterval(interval);
  interval = setInterval(updateTimer,1000);
}

function flip(card){
  if(!gameActive || card.innerText || selected.length === 2) return;

  card.innerText = card.dataset.emoji;
  selected.push(card);

  if(selected.length === 2){
    setTimeout(check,400);
  }
}

function check(){
  if(selected[0].dataset.emoji === selected[1].dataset.emoji &&
     selected[0].dataset.id !== selected[1].dataset.id){
    matched += 2;
  } else {
    selected[0].innerText = "";
    selected[1].innerText = "";
  }

  selected = [];

  if(matched === 256){
    win();
  }
}

function updateTimer(){
  time--;

  let m = Math.floor(time/60);
  let s = time%60;

  document.getElementById("timerTop").innerText =
    `TIEMPO: ${m}:${s < 10 ? "0"+s : s}`;

  if(time <= 0){
    resetGame();
  }
}

function resetGame(){
  clearInterval(interval);
  gameActive = false;
  alert("💥 SISTEMA RESETEADO - INTENTALO DE NUEVO");
  document.getElementById("intro").style.display = "block";
  grid.innerHTML = "";
}

function win(){
  gameActive = false;
  clearInterval(interval);
  document.getElementById("secret").style.display = "block";

  const target = new Date("2026-12-26T00:00:00").getTime();

  setInterval(()=>{
    let now = Date.now();
    let d = target - now;

    if(d <= 0){
      document.getElementById("bigTimer").innerText = "FINALIZADO";
      return;
    }

    let days = Math.floor(d/86400000);
    let hours = Math.floor((d%86400000)/3600000);
    let mins = Math.floor((d%3600000)/60000);
    let secs = Math.floor((d%60000)/1000);

    document.getElementById("bigTimer").innerText =
      `${days}d ${hours}h ${mins}m ${secs}s`;
  },1000);
}
</script>

</body>
</html>
