<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Acceso restringido</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: #00ff88;
  text-align: center;
}

/* --- INTRO --- */
#intro {
  padding-top: 80px;
}

#startBtn {
  padding: 15px 30px;
  font-size: 18px;
  background: #00ff88;
  border: none;
  cursor: pointer;
}

/* --- MEMORY GAME --- */
#game {
  display: none;
  margin-top: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 70px);
  gap: 10px;
  justify-content: center;
}

.card {
  width: 70px;
  height: 70px;
  background: #111;
  border: 1px solid #00ff88;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
}

/* --- UNLOCK --- */
#secret {
  display: none;
  margin-top: 40px;
}

#timer {
  font-size: 40px;
  margin: 20px;
}

a {
  color: #00ff88;
  font-size: 20px;
}
</style>
</head>

<body>

<div id="intro">
  <h1>ACCESO RESTRINGIDO</h1>
  <p>Desbloquea el sistema para continuar</p>
  <button id="startBtn">INICIAR ACCESO</button>
</div>

<div id="game">
  <h2>Encuentra todos los pares</h2>
  <div class="grid" id="grid"></div>
</div>

<div id="secret">
  <h2>SISTEMA DESBLOQUEADO</h2>
  <p>CUANDO CALCULEIS CUANDO ACABA LA CUENTA ATRAS, DARLE AL LINK DE ABAJO</p>
  <div id="timer"></div>
  <a href="https://TU-LINK-AQUI.COM" target="_blank">IR AL VIDEO</a>
</div>

<script>
const startBtn = document.getElementById("startBtn");
const game = document.getElementById("game");
const grid = document.getElementById("grid");

let emojis = ["💀","💀","🔥","🔥","⚡","⚡","🧠","🧠","👁","👁","💻","💻"];
let selected = [];
let matched = 0;

startBtn.onclick = () => {
  document.getElementById("intro").style.display = "none";
  game.style.display = "block";
  shuffle(emojis);
  render();
};

function shuffle(arr){
  arr.sort(() => Math.random() - 0.5);
}

function render(){
  grid.innerHTML = "";
  emojis.forEach((e,i)=>{
    let div = document.createElement("div");
    div.className = "card";
    div.innerText = "";
    div.onclick = () => flip(div, e);
    grid.appendChild(div);
  });
}

function flip(card, value){
  if(card.innerText || selected.length === 2) return;

  card.innerText = value;
  selected.push({card, value});

  if(selected.length === 2){
    setTimeout(check, 500);
  }
}

function check(){
  if(selected[0].value === selected[1].value){
    matched += 2;
    if(matched === emojis.length){
      unlock();
    }
  } else {
    selected[0].card.innerText = "";
    selected[1].card.innerText = "";
  }
  selected = [];
}

function unlock(){
  game.style.display = "none";
  document.getElementById("secret").style.display = "block";

  const target = new Date("2026-12-26T00:00:00").getTime();

  function update(){
    const now = Date.now();
    let d = target - now;

    if(d <= 0){
      document.getElementById("timer").innerText = "FINALIZADO";
      return;
    }

    let days = Math.floor(d / 86400000);
    let hours = Math.floor((d%86400000)/3600000);
    let mins = Math.floor((d%3600000)/60000);
    let secs = Math.floor((d%60000)/1000);

    document.getElementById("timer").innerText =
      `${days}d ${hours}h ${mins}m ${secs}s`;
  }

  setInterval(update,1000);
  update();
}
</script>

</body>
</html>
